<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TiendaClick POS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- html5-qrcode con versión fija y estable -->
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0f0d', surface: '#141a17', card: '#1c2420',
                        border: '#2a3530', muted: '#6b7c74', fg: '#e8ede9',
                        accent: '#00d4aa', accentDark: '#00a888', danger: '#ff4757'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>

    <style>
        :root { --accent: #00d4aa; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0f0d; color: #e8ede9; overflow-x: hidden; }
        .glass { background: rgba(20, 26, 23, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); }
        .glow { box-shadow: 0 0 30px rgba(0,212,170,0.25); }

        /* VIDEO DEL SCANNER */
        #scannerVideo {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 14px;
            display: block;
            background: #000;
        }
        #scannerCanvas { display: none; }

        /* Animación de línea de escaneo */
        .scan-line {
            position: absolute;
            left: 10%; right: 10%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00d4aa, transparent);
            border-radius: 2px;
            animation: scanAnim 2s ease-in-out infinite;
            box-shadow: 0 0 8px #00d4aa;
        }
        @keyframes scanAnim {
            0%   { top: 15%; opacity: 0; }
            10%  { opacity: 1; }
            50%  { top: 80%; }
            90%  { opacity: 1; }
            100% { top: 15%; opacity: 0; }
        }

        /* Esquinas del scanner */
        .corner { position: absolute; width: 22px; height: 22px; border-color: #00d4aa; border-style: solid; }
        .tl { top: 10%; left: 10%; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .tr { top: 10%; right: 10%; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .bl { bottom: 10%; left: 10%; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .br { bottom: 10%; right: 10%; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

        .btn { transition: all 0.18s ease; cursor: pointer; }
        .btn:active { transform: scale(0.96); }

        /* Scrollbar */
        .sc::-webkit-scrollbar { width: 5px; }
        .sc::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(6px); }
        .modal.open { display: flex; }

        /* Flash success */
        @keyframes flash { 0%,100% { opacity:0 } 40%,60% { opacity:1 } }
        .flash-overlay { animation: flash 0.5s ease-out; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Flash de éxito al escanear -->
    <div id="flashEl" class="fixed inset-0 pointer-events-none z-50 bg-accent/20 opacity-0"></div>

    <div class="max-w-6xl mx-auto flex flex-col lg:flex-row gap-8">

        <!-- ══════════ PANEL IZQUIERDO: SCANNER ══════════ -->
        <div class="w-full lg:w-[45%] flex flex-col gap-6">
            <!-- Encabezado -->
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-2xl bg-accent flex items-center justify-center glow shrink-0">
                    <svg class="w-8 h-8 text-bg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 7V5a1 1 0 011-1h2M17 4h2a1 1 0 011 1v2M4 17v2a1 1 0 001 1h2M17 20h2a1 1 0 001-1v-2M7 12h10"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">TiendaClick <span class="text-accent">POS</span></h1>
                    <p id="dbStatus" class="text-xs font-mono text-orange-400 uppercase tracking-widest">Modo Local</p>
                </div>
            </div>

            <!-- Tarjeta del Scanner -->
            <div class="glass rounded-3xl p-5">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-lg">Escáner de Productos</h2>
                    <span id="statusLabel" class="text-xs font-mono text-muted px-3 py-1 bg-white/5 rounded-full">Inactivo</span>
                </div>

                <!-- Viewport de la cámara -->
                <div class="relative rounded-2xl overflow-hidden bg-black" style="height: 280px;">
                    <video id="scannerVideo" autoplay playsinline muted></video>
                    <canvas id="scannerCanvas"></canvas>

                    <!-- Overlay de escaneo (visible solo cuando la cámara está activa) -->
                    <div id="scanOverlay" class="absolute inset-0 hidden">
                        <div class="scan-line"></div>
                        <div class="corner tl"></div>
                        <div class="corner tr"></div>
                        <div class="corner bl"></div>
                        <div class="corner br"></div>
                    </div>

                    <!-- Placeholder cuando no hay cámara -->
                    <div id="scanPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-muted/60">
                        <svg class="w-16 h-16 mb-3" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <p class="text-sm font-medium">Presiona "INICIAR" para activar la cámara</p>
                    </div>
                </div>

                <!-- Botones de control -->
                <div class="mt-5 grid grid-cols-2 gap-3">
                    <button id="btnStart" onclick="startCamera()" class="btn col-span-2 bg-accent text-bg font-black py-5 rounded-2xl text-lg glow flex items-center justify-center gap-3">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        INICIAR CÁMARA
                    </button>
                    <button id="btnStop" onclick="stopCamera()" class="btn hidden col-span-2 bg-danger/20 text-danger font-bold py-4 rounded-2xl border border-danger/30">
                        DETENER CÁMARA
                    </button>
                </div>

                <!-- Ingreso manual -->
                <div class="mt-5 pt-5 border-t border-white/5">
                    <p class="text-xs text-muted font-bold uppercase mb-3 tracking-wider">Ingreso Manual de Código</p>
                    <div class="flex gap-2">
                        <input id="manualCode" type="text" onkeydown="if(event.key==='Enter')manualSearch()"
                               class="flex-1 bg-surface border border-border rounded-xl px-4 py-3 font-mono text-sm focus:border-accent outline-none"
                               placeholder="Escribe el código...">
                        <button onclick="manualSearch()" class="btn px-5 bg-surface border border-border rounded-xl font-bold text-xs uppercase hover:border-accent">OK</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ══════════ PANEL DERECHO: CARRITO ══════════ -->
        <div class="flex-1">
            <div class="glass rounded-3xl p-6 flex flex-col" style="min-height: 600px;">
                <!-- Header del carrito -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Carrito de Venta</h2>
                    <span id="cartCountLabel" class="bg-accent/15 text-accent px-4 py-2 rounded-xl font-bold text-sm border border-accent/20">0 items</span>
                </div>

                <!-- Lista de productos -->
                <div id="cartList" class="flex-1 overflow-y-auto sc space-y-3 mb-6" style="max-height: 440px;">
                    <div id="emptyState" class="flex flex-col items-center justify-center h-56 opacity-30 text-center">
                        <svg class="w-20 h-20 mb-3" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                        <p class="italic text-sm">El carrito está vacío</p>
                    </div>
                </div>

                <!-- Totales y botón de pago -->
                <div class="border-t border-white/6 pt-6">
                    <div class="flex justify-between text-muted mb-2 text-sm">
                        <span>Subtotal</span>
                        <span id="subtotalVal" class="font-mono">$0.00</span>
                    </div>
                    <div class="flex justify-between items-baseline mb-6">
                        <span class="text-muted font-bold uppercase tracking-widest text-xs">Total</span>
                        <span id="totalVal" class="text-4xl font-black text-accent font-mono">$0.00</span>
                    </div>
                    <button onclick="finalizeSale()" class="btn w-full py-5 bg-accent text-bg font-black text-xl rounded-2xl glow">COBRAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════ MODAL: NUEVO PRODUCTO ══════════ -->
    <div id="modalNew" class="modal">
        <div class="glass w-full max-w-md p-8 rounded-[32px] m-4">
            <p class="text-xs font-bold text-accent uppercase tracking-widest mb-1">Producto no encontrado</p>
            <h3 class="text-2xl font-bold mb-1">Registrar Producto</h3>
            <p class="text-muted text-sm mb-6">Código: <span id="codeLabel" class="text-accent font-mono font-bold"></span></p>

            <form onsubmit="saveProduct(event)" class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-muted uppercase block mb-1">Nombre</label>
                    <input type="text" id="newName" required
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-lg focus:border-accent outline-none"
                           placeholder="Ej: Leche Lala 1L">
                </div>
                <div>
                    <label class="text-xs font-bold text-muted uppercase block mb-1">Precio ($)</label>
                    <input type="number" id="newPrice" step="0.01" min="0.01" required
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-2xl font-bold text-accent focus:border-accent outline-none"
                           placeholder="0.00">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="btn flex-1 py-4 text-muted font-bold bg-white/5 rounded-2xl">Cancelar</button>
                    <button type="submit" class="btn flex-1 py-4 bg-accent text-bg font-black rounded-2xl">Guardar y Agregar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ══════════ SUPABASE CONFIG ══════════
        const SB_URL = 'TU_URL_SUPABASE';
        const SB_KEY = 'TU_KEY_SUPABASE';
        let supabase = null;
        if (SB_URL.startsWith('http')) {
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
            document.getElementById('dbStatus').textContent = 'Base de datos: Online';
            document.getElementById('dbStatus').classList.replace('text-orange-400', 'text-accent');
        }

        // ══════════ ESTADO ══════════
        let cart = [];
        let cameraStream = null;
        let scanLoop = null;
        let isProcessing = false;
        let barcodeDetector = null;

        // ══════════ INIT: DETECTOR DE CÓDIGOS ══════════
        async function initBarcodeDetector() {
            if ('BarcodeDetector' in window) {
                barcodeDetector = new BarcodeDetector({
                    formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'qr_code', 'upc_a', 'upc_e']
                });
                console.log('✅ BarcodeDetector nativo disponible');
            } else {
                console.warn('⚠️ BarcodeDetector no disponible, se usará detección con html5-qrcode');
                barcodeDetector = null;
            }
        }

        // ══════════ CÁMARA: ABRIR ══════════
        async function startCamera() {
            const statusLabel = document.getElementById('statusLabel');
            const placeholder = document.getElementById('scanPlaceholder');
            const overlay = document.getElementById('scanOverlay');
            const video = document.getElementById('scannerVideo');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');

            statusLabel.textContent = 'Conectando...';

            try {
                // Pedir permiso de cámara trasera; si falla, pedir cualquier cámara
                const constraints = [
                    { video: { facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
                    { video: { facingMode: 'environment' } },
                    { video: true }
                ];

                let stream = null;
                for (const c of constraints) {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia(c);
                        break;
                    } catch(e) {
                        console.warn('Intento fallido con constraints:', c, e);
                    }
                }

                if (!stream) throw new Error('No se pudo acceder a ninguna cámara');

                cameraStream = stream;
                video.srcObject = stream;
                await video.play();

                // Actualizar UI
                placeholder.classList.add('hidden');
                overlay.classList.remove('hidden');
                btnStart.classList.add('hidden');
                btnStop.classList.remove('hidden');
                statusLabel.textContent = 'Activo ✓';
                statusLabel.classList.replace('text-muted', 'text-accent');

                // Iniciar detector
                await initBarcodeDetector();
                startScanLoop();

            } catch (err) {
                console.error('Error de cámara:', err);
                statusLabel.textContent = 'Error: ' + (err.name || 'falla');

                let msg = '⚠️ No se pudo abrir la cámara.\n\n';
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    msg += 'SOLUCIÓN: Toca el ícono del candado 🔒 en la barra de tu navegador y activa el permiso de "Cámara".';
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    msg += 'SOLUCIÓN: No se encontró ninguna cámara en tu dispositivo.';
                } else if (err.name === 'NotReadableError') {
                    msg += 'SOLUCIÓN: Otra aplicación está usando la cámara. Ciérrala e intenta de nuevo.';
                } else {
                    msg += 'Error técnico: ' + err.message;
                }
                alert(msg);
            }
        }

        // ══════════ CÁMARA: DETENER ══════════
        function stopCamera() {
            if (scanLoop) { clearInterval(scanLoop); scanLoop = null; }
            if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }

            const video = document.getElementById('scannerVideo');
            video.srcObject = null;

            document.getElementById('scanPlaceholder').classList.remove('hidden');
            document.getElementById('scanOverlay').classList.add('hidden');
            document.getElementById('btnStart').classList.remove('hidden');
            document.getElementById('btnStop').classList.add('hidden');
            document.getElementById('statusLabel').textContent = 'Inactivo';
            document.getElementById('statusLabel').classList.replace('text-accent', 'text-muted');
        }

        // ══════════ BUCLE DE DETECCIÓN ══════════
        function startScanLoop() {
            const video = document.getElementById('scannerVideo');
            const canvas = document.getElementById('scannerCanvas');
            const ctx = canvas.getContext('2d');

            scanLoop = setInterval(async () => {
                if (isProcessing || video.readyState < 2) return;

                if (barcodeDetector) {
                    // Usar API nativa (Chrome Android, Chrome Desktop)
                    try {
                        const codes = await barcodeDetector.detect(video);
                        if (codes.length > 0) {
                            onCodeDetected(codes[0].rawValue);
                        }
                    } catch(e) { /* silencioso */ }
                } else {
                    // Fallback: usar html5-qrcode como librería de decodificación
                    try {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0);
                        const imageData = canvas.toDataURL('image/jpeg', 0.8);
                        Html5Qrcode.scanFile(imageData, false)
                            .then(code => onCodeDetected(code))
                            .catch(() => {});
                    } catch(e) { /* silencioso */ }
                }
            }, 300); // Revisar cada 300ms
        }

        // ══════════ PROCESAMIENTO DE CÓDIGO ══════════
        async function onCodeDetected(code) {
            if (isProcessing) return;
            isProcessing = true;

            // Feedback visual y háptico
            const flash = document.getElementById('flashEl');
            flash.classList.add('flash-overlay');
            if (navigator.vibrate) navigator.vibrate(150);
            setTimeout(() => flash.classList.remove('flash-overlay'), 500);

            document.getElementById('statusLabel').textContent = 'Detectado: ' + code;

            await processCode(code);

            setTimeout(() => {
                isProcessing = false;
                document.getElementById('statusLabel').textContent = 'Activo ✓';
            }, 2500);
        }

        async function processCode(code) {
            let product = null;

            if (supabase) {
                const { data } = await supabase.from('productos').select('*').eq('codigo_barras', code).single();
                product = data;
            } else {
                const db = JSON.parse(localStorage.getItem('pos_local') || '[]');
                product = db.find(p => p.codigo_barras === code) || null;
            }

            if (product) {
                addToCart(product);
            } else {
                openModal(code);
            }
        }

        // ══════════ CARRITO ══════════
        function addToCart(p) {
            const ex = cart.find(i => i.id === p.id);
            if (ex) { ex.qty++; } else { cart.push({ ...p, qty: 1 }); }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            const totalEl = document.getElementById('totalVal');
            const subEl = document.getElementById('subtotalVal');
            const countEl = document.getElementById('cartCountLabel');

            if (cart.length === 0) {
                list.innerHTML = `<div id="emptyState" class="flex flex-col items-center justify-center h-56 opacity-30 text-center">
                    <svg class="w-20 h-20 mb-3" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    <p class="italic text-sm">El carrito está vacío</p></div>`;
                totalEl.textContent = '$0.00'; subEl.textContent = '$0.00'; countEl.textContent = '0 items';
                return;
            }

            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                const sub = item.precio * item.qty;
                total += sub;
                return `<div class="flex items-center gap-4 bg-white/5 p-4 rounded-2xl border border-white/5">
                    <div class="w-12 h-12 bg-accent/20 rounded-xl flex items-center justify-center font-black text-accent text-lg">${item.qty}x</div>
                    <div class="flex-1 min-w-0">
                        <p class="font-bold truncate">${item.nombre}</p>
                        <p class="text-xs font-mono text-muted">${item.codigo_barras}</p>
                    </div>
                    <div class="text-right shrink-0">
                        <p class="font-black font-mono text-accent text-lg">$${sub.toFixed(2)}</p>
                        <button onclick="removeItem(${i})" class="text-[10px] text-danger/60 hover:text-danger font-bold uppercase">Quitar</button>
                    </div>
                </div>`;
            }).join('');

            const qty = cart.reduce((a, b) => a + b.qty, 0);
            countEl.textContent = `${qty} item${qty !== 1 ? 's' : ''}`;
            subEl.textContent = `$${total.toFixed(2)}`;
            totalEl.textContent = `$${total.toFixed(2)}`;
        }

        function removeItem(i) { cart.splice(i, 1); renderCart(); }

        // ══════════ MODAL ══════════
        function openModal(code) {
            document.getElementById('codeLabel').textContent = code;
            document.getElementById('modalNew').classList.add('open');
            setTimeout(() => document.getElementById('newName').focus(), 200);
        }
        function closeModal() { document.getElementById('modalNew').classList.remove('open'); }

        async function saveProduct(e) {
            e.preventDefault();
            const code = document.getElementById('codeLabel').textContent;
            const nombre = document.getElementById('newName').value.trim();
            const precio = parseFloat(document.getElementById('newPrice').value);

            const prod = { id: `local_${Date.now()}`, nombre, precio, codigo_barras: code };

            if (supabase) {
                const { data } = await supabase.from('productos').insert([prod]).select().single();
                if (data) prod.id = data.id;
            } else {
                const db = JSON.parse(localStorage.getItem('pos_local') || '[]');
                db.push(prod);
                localStorage.setItem('pos_local', JSON.stringify(db));
            }

            addToCart(prod);
            closeModal();
            e.target.reset();
        }

        // ══════════ BÚSQUEDA MANUAL ══════════
        function manualSearch() {
            const inp = document.getElementById('manualCode');
            const code = inp.value.trim();
            if (code) { processCode(code); inp.value = ''; }
        }

        // ══════════ FINALIZAR VENTA ══════════
        async function finalizeSale() {
            if (cart.length === 0) { alert('El carrito está vacío'); return; }
            const total = cart.reduce((a, b) => a + b.precio * b.qty, 0);
            if (confirm(`¿Confirmar venta por $${total.toFixed(2)}?`)) {
                if (supabase) {
                    const { data: venta } = await supabase.from('ventas').insert([{ total, fecha: new Date().toISOString() }]).select().single();
                    if (venta) {
                        const detalles = cart.map(item => ({ venta_id: venta.id, producto_id: item.id, cantidad: item.qty, precio_unitario: item.precio }));
                        await supabase.from('detalle_venta').insert(detalles);
                    }
                }
                alert(`✅ Venta completada: $${total.toFixed(2)}`);
                cart = [];
                renderCart();
            }
        }
    </script>
</body>
</html>
