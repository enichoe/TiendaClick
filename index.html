<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TiendaClick POS | Escáner de Alto Rendimiento</title>
    
    <!-- Dependencias -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0f0d', surface: '#141a17', card: '#1c2420',
                        border: '#2a3530', muted: '#6b7c74', fg: '#e8ede9',
                        accent: '#00d4aa', accentDark: '#00a888', danger: '#ff4757'
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    
    <style>
        :root { --accent: #00d4aa; --bg: #0a0f0d; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #e8ede9; overflow-x: hidden; }
        
        .glass { background: rgba(20, 26, 23, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-accent { box-shadow: 0 0 20px rgba(0, 212, 170, 0.2); }
        
        /* Contenedor del Escáner */
        #reader { width: 100% !important; border: none !important; border-radius: 16px !important; overflow: hidden !important; }
        #reader video { width: 100% !important; height: 320px !important; object-fit: cover !important; }
        #reader__dashboard_section_csr button { background: var(--accent) !important; color: black !important; padding: 10px 20px !important; border-radius: 8px !important; text-transform: uppercase; font-weight: bold; border: none !important; }
        
        .btn-action { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-action:active { transform: scale(0.95); opacity: 0.8; }
        
        /* Animación de escaneo exitoso */
        @keyframes scan-flash {
            0% { background: rgba(0, 212, 170, 0); }
            50% { background: rgba(0, 212, 170, 0.3); }
            100% { background: rgba(0, 212, 170, 0); }
        }
        .flash-active { animation: scan-flash 0.5s ease-out; }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div id="flashOverlay" class="fixed inset-0 pointer-events-none z-50"></div>

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
        
        <!-- PANEL IZQUIERDO: SCANNER -->
        <div class="w-full lg:w-5/12 space-y-6">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-14 h-14 bg-accent rounded-2xl flex items-center justify-center shadow-lg glow-accent">
                    <svg class="w-8 h-8 text-bg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v1m0 11v1m-7-6H4m16 0h-1m-3-5.228a9 9 0 010 12.456M7 7.01a9 9 0 000 9.98M10.12 10.12a3 3 0 010 3.76M13.88 13.88a3 3 0 000-3.76"/></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">TiendaClick <span class="text-accent">POS</span></h1>
                    <p id="dbStatus" class="text-xs font-mono uppercase tracking-widest text-muted">Inicializando...</p>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold text-lg flex items-center gap-2">
                        <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-accent"></span></span>
                        Cámara Activa
                    </h2>
                    <span id="scanResult" class="text-xs font-mono text-muted">Listo para escanear</span>
                </div>

                <div id="reader" class="rounded-2xl bg-black shadow-inner"></div>

                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button id="startBtn" onclick="initScanner()" class="btn-action bg-accent text-bg font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                        INICIAR
                    </button>
                    <button id="stopBtn" onclick="stopScanner()" class="btn-action bg-white/5 text-white/40 font-bold py-4 rounded-2xl hidden">DETENER</button>
                    
                    <div class="col-span-2 flex gap-2 mt-2">
                        <input type="text" id="manualInput" class="flex-1 bg-surface border border-border rounded-xl px-4 py-3 font-mono text-sm focus:border-accent focus:outline-none" placeholder="Código manual...">
                        <button onclick="manualSearch()" class="px-6 bg-surface border border-border rounded-xl hover:bg-white/5 transition-colors font-bold uppercase text-xs">OK</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PANEL DERECHO: CARRITO -->
        <div class="flex-1">
            <div class="glass h-full rounded-3xl flex flex-col p-6 min-h-[600px]">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <h2 class="text-2xl font-bold">Carrito de Venta</h2>
                        <p class="text-muted text-sm" id="cartTimestamp">Nueva sesión de venta</p>
                    </div>
                    <div class="text-right">
                        <span id="cartCount" class="bg-accent/10 text-accent px-4 py-2 rounded-xl text-sm font-bold border border-accent/20">0 PRODUCTOS</span>
                    </div>
                </div>

                <div id="cartList" class="flex-1 space-y-4 overflow-y-auto pr-2 custom-scroll max-h-[450px]">
                    <div class="flex flex-col items-center justify-center h-64 text-center opacity-30">
                        <svg class="w-20 h-20 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <p class="italic">Esperando escaneo...</p>
                    </div>
                </div>

                <div class="mt-8 pt-8 border-t border-white/5">
                    <div class="flex justify-between items-center mb-6">
                        <div class="text-muted font-bold text-sm tracking-widest uppercase">Total a Cobrar</div>
                        <div id="totalDisplay" class="text-5xl font-bold text-accent tracking-tighter">$0.00</div>
                    </div>
                    <button onclick="finalizeSale()" class="btn-action w-full py-6 bg-accent text-bg rounded-2xl text-xl font-black shadow-[0_0_30px_rgba(0,212,170,0.3)]">FINALIZAR COMPRA</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: REGISTRO RÁPIDO -->
    <div id="modalNew" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="glass w-full max-w-lg p-8 rounded-[40px] shadow-2xl">
            <div class="w-20 h-20 bg-accent/10 rounded-3xl flex items-center justify-center mb-6 text-accent">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h3 class="text-3xl font-bold mb-2">Nuevo Producto</h3>
            <p class="text-muted mb-8">El código <span id="newCodeLabel" class="text-accent font-mono font-bold"></span> no está en el sistema.</p>
            
            <form id="newProductForm" onsubmit="saveProduct(event)" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-muted uppercase ml-2">Nombre del Producto</label>
                    <input type="text" id="newName" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-lg focus:border-accent outline-none transition-all" placeholder="Ej: Café Americano Lg" required autofocus>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-muted uppercase ml-2">Precio de Venta ($)</label>
                    <input type="number" id="newPrice" step="0.01" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-3xl font-bold text-accent focus:border-accent outline-none transition-all" placeholder="0.00" required>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 text-muted font-bold">CANCELAR</button>
                    <button type="submit" class="flex-1 bg-accent text-bg py-4 rounded-2xl font-black text-lg shadow-lg shadow-accent/20">GUARDAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // CONFIG SUPABASE
        const SUPABASE_URL = 'https://tu-url.supabase.co'; // Reemplazar con URL real
        const SUPABASE_KEY = 'tu-anon-key'; // Reemplazar con KEY real
        let supabase = null;

        if (SUPABASE_URL.startsWith('http') && SUPABASE_URL.includes('.supabase.co')) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            document.getElementById('dbStatus').textContent = 'Cloud Database: Online';
            document.getElementById('dbStatus').classList.add('text-accent');
        } else {
            document.getElementById('dbStatus').textContent = 'Modo Local (Escáner de Prueba)';
            document.getElementById('dbStatus').classList.add('text-orange-400');
        }

        let cart = [];
        let html5QrCode = null;
        let isProcessing = false;

        // INICIALIZAR ESCÁNER
        async function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 15, 
                qrbox: { width: 250, height: 180 },
                aspectRatio: 1.0,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            try {
                document.getElementById('startBtn').classList.add('hidden');
                document.getElementById('stopBtn').classList.remove('hidden');
                
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess
                );
            } catch (err) {
                console.error(err);
                alert("Error de cámara: Asegúrate de estar en HTTPS y dar permisos.");
                stopScanner();
            }
        }

        async function stopScanner() {
            if (html5QrCode) {
                try {
                    await html5QrCode.stop();
                    await html5QrCode.clear();
                } catch(e) {}
            }
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('stopBtn').classList.add('hidden');
        }

        async function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;
            
            // Efecto Visual y Háptico
            document.getElementById('flashOverlay').classList.add('flash-active');
            if (navigator.vibrate) navigator.vibrate(100);
            document.getElementById('scanResult').textContent = "Código: " + decodedText;

            await handleProductAction(decodedText);
            
            setTimeout(() => {
                document.getElementById('flashOverlay').classList.remove('flash-active');
                isProcessing = false;
            }, 2000); // 2 segundos de pausa para evitar duplicados
        }

        async function handleProductAction(code) {
            let product = null;

            if (supabase) {
                const { data } = await supabase.from('productos').select('*').eq('codigo_barras', code).single();
                product = data;
            } else {
                const db = JSON.parse(localStorage.getItem('tc_local_db') || '[]');
                product = db.find(p => p.codigo_barras === code);
            }

            if (product) {
                addItemToCart(product);
            } else {
                openModal(code);
            }
        }

        function addItemToCart(p) {
            const existing = cart.find(item => item.id === p.id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...p, qty: (p.qty || 1) });
            }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cartList');
            const totalEl = document.getElementById('totalDisplay');
            const countEl = document.getElementById('cartCount');

            if (cart.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-center opacity-30"><p class="italic">Esperando escaneo...</p></div>`;
                totalEl.textContent = "$0.00";
                countEl.textContent = "0 PRODUCTOS";
                return;
            }

            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                const sub = item.precio * item.qty;
                total += sub;
                return `
                    <div class="flex items-center gap-4 bg-white/5 p-5 rounded-2xl border border-white/5">
                        <div class="w-12 h-12 bg-accent/20 rounded-xl flex items-center justify-center font-bold text-accent">${item.qty}x</div>
                        <div class="flex-1">
                            <h4 class="font-bold text-lg">${item.nombre}</h4>
                            <p class="text-xs font-mono text-muted tracking-widest">${item.codigo_barras}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-bold font-mono text-accent">$${sub.toFixed(2)}</p>
                            <button onclick="removeIdx(${idx})" class="text-[10px] font-black text-danger/50 hover:text-danger uppercase tracking-tighter">Eliminar</button>
                        </div>
                    </div>
                `;
            }).join('');

            totalEl.textContent = `$${total.toFixed(2)}`;
            const totalQty = cart.reduce((a, b) => a + (b.qty || 1), 0);
            countEl.textContent = `${totalQty} PRODUCTO${totalQty !== 1 ? 'S' : ''}`;
        }

        function removeIdx(idx) {
            cart.splice(idx, 1);
            renderCart();
        }

        // MODAL Y STORAGE
        function openModal(code) {
            document.getElementById('newCodeLabel').textContent = code;
            document.getElementById('modalNew').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('modalNew').classList.replace('flex', 'hidden');
        }

        async function saveProduct(e) {
            e.preventDefault();
            const code = document.getElementById('newCodeLabel').textContent;
            const name = document.getElementById('newName').value;
            const price = parseFloat(document.getElementById('newPrice').value);
            
            const prod = { id: Date.now(), nombre: name, precio: price, codigo_barras: code, qty: 1 };

            if (supabase) {
                await supabase.from('productos').insert([prod]);
            } else {
                const db = JSON.parse(localStorage.getItem('tc_local_db') || '[]');
                db.push(prod);
                localStorage.setItem('tc_local_db', JSON.stringify(db));
            }

            addItemToCart(prod);
            closeModal();
            e.target.reset();
        }

        function manualSearch() {
            const input = document.getElementById('manualInput');
            if (input.value) {
                handleProductAction(input.value);
                input.value = '';
            }
        }

        function finalizeSale() {
            if (cart.length === 0) return;
            alert("¡Venta Exitosa! Reporte guardado.");
            cart = [];
            renderCart();
        }
    </script>
</body>
</html>
